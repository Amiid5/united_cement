<!doctype html>
<html lang="en">
	<head>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
			rel="stylesheet"
		/>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Primary SEO -->
		<title>United Cement | Premium Cement & Steel Supplier</title>
		<meta
			name="description"
			content="United Cement supplies high-quality cement and steel for construction, industrial, and infrastructure projects. Trusted by builders for reliable materials and fast delivery."
		/>
		<meta
			name="keywords"
			content="United Cement, cement supplier, steel supplier, construction materials, cement and steel, building materials, bulk cement, steel bars, rebar, construction supply"
		/>
		<meta name="author" content="United Cement" />
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://www.unitedcement.com/" />

		<!-- Open Graph / Facebook / LinkedIn -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="United Cement" />
		<meta property="og:title" content="United Cement | Premium Cement & Steel Supplier" />
		<meta
			property="og:description"
			content="High-quality cement and steel for construction, industrial, and infrastructure projects. Reliable materials, fast delivery."
		/>
		<meta property="og:url" content="https://www.unitedcement.com/" />
		<meta property="og:image" content="https://www.unitedcement.com/og-image.jpg" />
		<meta property="og:locale" content="en_US" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="United Cement | Premium Cement & Steel Supplier" />
		<meta
			name="twitter:description"
			content="High-quality cement and steel for construction, industrial, and infrastructure projects. Reliable materials, fast delivery."
		/>
		<meta name="twitter:image" content="https://www.unitedcement.com/og-image.jpg" />

		<!-- Favicon -->
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />

		<!-- Structured data for company/organization -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Organization",
				"name": "United Cement",
				"url": "https://www.unitedcement.com/",
				"logo": "https://www.unitedcement.com/logo/LOGO-v3.svg",
				"description": "United Cement supplies high-quality cement and steel for construction, industrial, and infrastructure projects.",
				"sameAs": []
			}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
